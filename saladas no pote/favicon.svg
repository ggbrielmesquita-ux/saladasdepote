<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo circular verde -->
  <circle cx="32" cy="32" r="32" fill="#2E7D32"/>

  <!-- Pote / frasco (corpo) -->
  <rect x="18" y="32" width="28" height="18" rx="3" fill="#fff"/>
  <!-- Boca do pote -->
  <rect x="20" y="27" width="24" height="7" rx="2" fill="#e0e0e0"/>
  <!-- Tampa -->
  <rect x="19" y="23" width="26" height="6" rx="3" fill="#1B5E20"/>

  <!-- Folhas de salada saindo do pote -->
  <!-- Folha esquerda -->
  <ellipse cx="24" cy="25" rx="5" ry="3" fill="#66BB6A" transform="rotate(-30 24 25)"/>
  <!-- Folha central -->
  <ellipse cx="32" cy="22" rx="5" ry="3.5" fill="#A5D6A7" transform="rotate(5 32 22)"/>
  <!-- Folha direita -->
  <ellipse cx="40" cy="25" rx="5" ry="3" fill="#66BB6A" transform="rotate(30 40 25)"/>

  <!-- Tomate (detalhe no pote) -->
  <circle cx="27" cy="40" r="4" fill="#EF5350"/>
  <rect x="26" y="36" width="2" height="2" rx="1" fill="#388E3C"/>

  <!-- Cenoura (detalhe no pote) -->
  <ellipse cx="37" cy="41" rx="4" ry="2.5" fill="#FF7043" transform="rotate(-15 37 41)"/>
</svg>
